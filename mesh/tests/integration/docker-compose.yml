services:
  headscale:
    image: headscale/headscale:0.27.1
    container_name: meshtest-headscale
    hostname: headscale
    command: serve
    volumes:
      - ./headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./headscale/derp.yaml:/etc/headscale/derp.yaml:ro
      - ./headscale/acl.yaml:/etc/headscale/acl.yaml:ro
      - headscale-data:/var/lib/headscale
    networks:
      meshtest:
        ipv4_address: 192.168.50.10
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  client-a:
    image: tailscale/tailscale:latest
    container_name: meshtest-client-a
    hostname: client-a
    entrypoint: /local-entrypoint.sh
    command:
      - tailscaled
      - --state=/var/lib/tailscale/tailscaled.state
      - --socket=/var/run/tailscale/tailscaled.sock
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - client-a-state:/var/lib/tailscale
      - ./certs:/certs:ro
      - ./certs/client-entrypoint.sh:/local-entrypoint.sh:ro
    extra_hosts:
      - "derp.meshtest.local:192.168.50.13"
    networks:
      meshtest:
        ipv4_address: 192.168.50.11
    depends_on:
      headscale:
        condition: service_healthy
      derper:
        condition: service_healthy

  client-b:
    image: tailscale/tailscale:latest
    container_name: meshtest-client-b
    hostname: client-b
    entrypoint: /local-entrypoint.sh
    command:
      - tailscaled
      - --state=/var/lib/tailscale/tailscaled.state
      - --socket=/var/run/tailscale/tailscaled.sock
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - client-b-state:/var/lib/tailscale
      - ./certs:/certs:ro
      - ./certs/client-entrypoint.sh:/local-entrypoint.sh:ro
    extra_hosts:
      - "derp.meshtest.local:192.168.50.13"
    networks:
      meshtest:
        ipv4_address: 192.168.50.12
    depends_on:
      headscale:
        condition: service_healthy
      derper:
        condition: service_healthy

  derper:
    build:
      context: ./derper
    container_name: meshtest-derper
    hostname: derp.meshtest.local
    restart: "no"
    command:
      - -hostname
      - derp.meshtest.local
      - -a
      - ":443"
      - -certmode
      - manual
      - -certdir
      - /certs
    volumes:
      - ./certs:/certs:ro
    networks:
      meshtest:
        ipv4_address: 192.168.50.13
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- --no-check-certificate https://derp.meshtest.local/derp/probe >/dev/null 2>&1 || exit 1"
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

# The meshtest network attaches to the existing Linux bridge owned by
# winvm.sh (br-vm). QEMU Windows VMs attach taps to the same bridge and
# receive DHCP leases in 192.168.50.100-199 from dnsmasq. Docker owns
# .10-.12 statically. Masquerade is off — this network is for isolated
# mesh testing, not outbound traffic.
networks:
  meshtest:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-vm
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.1
          ip_range: 192.168.50.0/28

volumes:
  headscale-data:
  client-a-state:
  client-b-state:
