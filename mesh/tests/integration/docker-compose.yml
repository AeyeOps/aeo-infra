services:
  headscale:
    image: headscale/headscale:0.27.1
    container_name: meshtest-headscale
    hostname: headscale
    command: serve
    volumes:
      - ./headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./headscale/derp.yaml:/etc/headscale/derp.yaml:ro
      - ./headscale/acl.yaml:/etc/headscale/acl.yaml:ro
      - headscale-data:/var/lib/headscale
    networks:
      meshtest:
        ipv4_address: 192.168.50.10
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  client-a:
    image: tailscale/tailscale:latest
    container_name: meshtest-client-a
    hostname: client-a
    entrypoint: []
    command:
      - tailscaled
      - --state=/var/lib/tailscale/tailscaled.state
      - --socket=/var/run/tailscale/tailscaled.sock
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - client-a-state:/var/lib/tailscale
    networks:
      meshtest:
        ipv4_address: 192.168.50.11
    depends_on:
      headscale:
        condition: service_healthy

  client-b:
    image: tailscale/tailscale:latest
    container_name: meshtest-client-b
    hostname: client-b
    entrypoint: []
    command:
      - tailscaled
      - --state=/var/lib/tailscale/tailscaled.state
      - --socket=/var/run/tailscale/tailscaled.sock
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - client-b-state:/var/lib/tailscale
    networks:
      meshtest:
        ipv4_address: 192.168.50.12
    depends_on:
      headscale:
        condition: service_healthy

# The meshtest network attaches to the existing Linux bridge owned by
# winvm.sh (br-vm). QEMU Windows VMs attach taps to the same bridge and
# receive DHCP leases in 192.168.50.100-199 from dnsmasq. Docker owns
# .10-.12 statically. Masquerade is off — this network is for isolated
# mesh testing, not outbound traffic.
networks:
  meshtest:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-vm
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.1
          ip_range: 192.168.50.0/28

volumes:
  headscale-data:
  client-a-state:
  client-b-state:
